# tmux.conf — AMux configuration
# Source user's existing config first, then apply AMux overrides

if-shell "[ -f ~/.tmux.conf ]" "source-file ~/.tmux.conf"

# ── Status bar ────────────────────────────────────────────────────────────────

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 120

# Left: session name
set -g status-left "#[fg=colour255,bg=colour238,bold] ❐ #S #[fg=colour238,bg=default]█#[default] "

# Right: AMux alert scanner + clock
set -g status-right "#($AMUX_DIR/lib/status.sh) #[fg=colour240]│#[fg=colour248] %H:%M "

# ── Window list ───────────────────────────────────────────────────────────────

set -g status-style "bg=colour234,fg=colour248"

# Plain window
set -g window-status-format " #I:#W "

# Active window
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"

# ── Pane borders ──────────────────────────────────────────────────────────────

set -g pane-border-style "fg=colour238"

# Active pane border changes color based on AMux state:
#   Claude + waiting → yellow (226)
#   Claude + error   → red    (196)
#   Claude + done    → green  (46)
#   Claude + idle    → cyan   (39)
#   Plain pane       → white  (255)
set -g pane-active-border-style \
  "#{?#{==:#{@amux_role},claude},#{?#{==:#{@amux_state},waiting},fg=colour226,#{?#{==:#{@amux_state},error},fg=colour196,#{?#{==:#{@amux_state},done},fg=colour46,fg=colour39}}},fg=colour255}"

# ── Pane title (shows role) ───────────────────────────────────────────────────

set -g pane-border-status top
set -g pane-border-format "#{?#{==:#{@amux_role},claude}, Claude [#{@amux_state}#{?#{@amux_tool}, · #{@amux_tool},}] , #{pane_title} }"

# ── General settings ──────────────────────────────────────────────────────────

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g automatic-rename off       # AMux manages window names explicitly

# ── Personal settings ─────────────────────────────────────────────────────────

# Reload AMux config
bind r source-file "$AMUX_DIR/tmux.conf" \; display-message "AMux config reloaded"

# Clear alerts when user switches to a window
set-hook -g after-select-window 'run-shell "$AMUX_DIR/lib/hooks/on-window-focus.sh"'
