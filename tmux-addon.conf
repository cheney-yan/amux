# tmux-addon.conf — AMux additions
# Sourced from ~/.tmux.conf via install.sh.
# Does NOT touch status-right, status-left, or window-status styles.

# ── Window naming ─────────────────────────────────────────────────────────────

# Disable auto-rename so [C...] prefixes set by AMux stick
set -g automatic-rename off

# ── Pane border: show Claude state in pane title ──────────────────────────────

set -g pane-border-status top
set -g pane-border-format "#{?#{==:#{@amux_role},claude}, Claude [#{@amux_state}#{?#{@amux_tool}, · #{@amux_tool},}] , #{pane_title} }"

# ── Window focus: clear alerts + rescan when user visits a window ─────────────

set-hook -g after-select-window "run-shell '$AMUX_DIR/lib/hooks/on-window-focus.sh'"
